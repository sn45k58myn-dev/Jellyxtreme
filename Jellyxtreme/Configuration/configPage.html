<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Jellyxtreme Settings</title>
</head>
<body>
    <div id="JellyxtremeConfigPage" data-role="page" class="page type-interior pluginConfigurationPage" data-require="emby-input,emby-button,emby-checkbox">
        <div data-role="content">
            <div class="content-primary">
                <form id="JellyxtremeConfigForm">
                    <div class="inputContainer">
                        <label class="inputLabel" for="ServerUrl">Xtream Server URL</label>
                        <input type="url" id="ServerUrl" is="emby-input" required />
                    </div>
                    <div class="inputContainer">
                        <label class="inputLabel" for="Username">Username</label>
                        <input type="text" id="Username" is="emby-input" autocomplete="username" required />
                    </div>
                    <div class="inputContainer">
                        <label class="inputLabel" for="Password">Password</label>
                        <input type="password" id="Password" is="emby-input" autocomplete="current-password" required />
                    </div>

                    <div class="inputContainer">
                        <label class="inputLabel" for="SyncIntervalHours">Sync interval hours</label>
                        <input type="number" id="SyncIntervalHours" is="emby-input" min="1" step="1" />
                    </div>
                    <div class="inputContainer">
                        <label class="inputLabel" for="CacheMinutes">Request timeout minutes</label>
                        <input type="number" id="CacheMinutes" is="emby-input" min="1" step="1" />
                    </div>

                    <div class="inputContainer">
                        <button is="emby-button" type="button" id="TestConnectionButton" class="raised">
                            <span>Test Connection</span>
                        </button>
                        <button is="emby-button" type="button" id="RefreshCategoriesButton" class="raised">
                            <span>Refresh Categories</span>
                        </button>
                    </div>
                    <p id="ConnectionStatus" class="fieldDescription"></p>
                    <div id="CacheSummary" class="fieldDescription">
                        <div id="LastSyncStatus">Last sync: never</div>
                        <div id="LiveChannelsCached">Live channels cached: 0</div>
                        <div id="VodItemsCached">VOD items cached: 0</div>
                        <div id="SeriesCached">Series cached: 0</div>
                        <div id="EpisodesCached">Episodes cached: 0</div>
                        <div id="CacheVersion">Cache version: unknown</div>
                        <div id="SyncDuration">Sync duration: none</div>
                        <div id="LastSyncError">Last error: none</div>
                    </div>

                    <h2>Live TV</h2>
                    <label class="checkboxContainer">
                        <input type="checkbox" is="emby-checkbox" id="EnableLiveTv" />
                        <span>Enable Live TV cache</span>
                    </label>
                    <p id="LiveCategoryCount" class="fieldDescription">0 selected</p>
                    <div class="inputContainer">
                        <button is="emby-button" type="button" class="raised sectionSelectAll" data-target="LiveCategories"><span>Select All</span></button>
                        <button is="emby-button" type="button" class="raised sectionClearAll" data-target="LiveCategories"><span>Clear All</span></button>
                    </div>
                    <div id="LiveCategories" class="categoryList"></div>

                    <h2>VOD</h2>
                    <label class="checkboxContainer">
                        <input type="checkbox" is="emby-checkbox" id="EnableVod" />
                        <span>Enable VOD cache</span>
                    </label>
                    <p id="VodCategoryCount" class="fieldDescription">0 selected</p>
                    <div class="inputContainer">
                        <button is="emby-button" type="button" class="raised sectionSelectAll" data-target="VodCategories"><span>Select All</span></button>
                        <button is="emby-button" type="button" class="raised sectionClearAll" data-target="VodCategories"><span>Clear All</span></button>
                    </div>
                    <div id="VodCategories" class="categoryList"></div>

                    <h2>Series</h2>
                    <label class="checkboxContainer">
                        <input type="checkbox" is="emby-checkbox" id="EnableSeries" />
                        <span>Enable Series cache</span>
                    </label>
                    <p id="SeriesCategoryCount" class="fieldDescription">0 selected</p>
                    <div class="inputContainer">
                        <button is="emby-button" type="button" class="raised sectionSelectAll" data-target="SeriesCategories"><span>Select All</span></button>
                        <button is="emby-button" type="button" class="raised sectionClearAll" data-target="SeriesCategories"><span>Clear All</span></button>
                    </div>
                    <div id="SeriesCategories" class="categoryList"></div>

                    <button is="emby-button" type="submit" class="raised button-submit block">
                        <span>Save</span>
                    </button>
                </form>
            </div>
        </div>

        <script>
            (function () {
                var pluginId = "A4B6C922-1D5F-4E90-B8A6-FA3A6E4C4D78";
                var currentConfig = {};

                function page() {
                    return document.getElementById('JellyxtremeConfigPage');
                }

                function value(selector) {
                    return page().querySelector(selector).value;
                }

                function checked(selector) {
                    return page().querySelector(selector).checked;
                }

                function connectionPayload() {
                    return {
                        ServerUrl: value('#ServerUrl'),
                        Username: value('#Username'),
                        Password: value('#Password')
                    };
                }

                function isLikelyServerUrl(serverUrl) {
                    var candidate = (serverUrl || '').trim();
                    if (!candidate) {
                        return false;
                    }

                    if (candidate.indexOf('://') === -1) {
                        candidate = 'http://' + candidate;
                    }

                    try {
                        var parsed = new URL(candidate);
                        var host = parsed.hostname || '';
                        var isIpAddress = /^\d{1,3}(\.\d{1,3}){3}$/.test(host);
                        return (parsed.protocol === 'http:' || parsed.protocol === 'https:')
                            && (host.indexOf('.') !== -1 || host.toLowerCase() === 'localhost' || isIpAddress);
                    } catch (_) {
                        return false;
                    }
                }

                function validateConnectionPayload(payload) {
                    if (!isLikelyServerUrl(payload.ServerUrl)) {
                        return 'Server URL must be an absolute http or https URL, or a valid host:port Xtream server address.';
                    }

                    if (!payload.Username.trim() || !payload.Password.trim()) {
                        return 'Username and password are required.';
                    }

                    return '';
                }

                function postJson(path, payload) {
                    return ApiClient.ajax({
                        type: 'POST',
                        url: ApiClient.getUrl(path),
                        data: JSON.stringify(payload),
                        contentType: 'application/json',
                        dataType: 'json',
                        headers: {
                            Accept: 'application/json'
                        }
                    }).then(parseJsonResponse);
                }

                function getJson(path) {
                    return ApiClient.ajax({
                        type: 'GET',
                        url: ApiClient.getUrl(path),
                        dataType: 'json',
                        headers: {
                            Accept: 'application/json'
                        }
                    }).then(parseJsonResponse);
                }

                function parseJsonResponse(response) {
                    if (response && response.responseJSON) {
                        return response.responseJSON;
                    }

                    if (response && typeof response.responseText === 'string') {
                        return parseJsonResponse(response.responseText);
                    }

                    if (typeof response !== 'string') {
                        return response;
                    }

                    try {
                        return JSON.parse(response);
                    } catch (_) {
                        return response;
                    }
                }

                function ajaxErrorMessage(error, fallback) {
                    if (error && error.responseJSON) {
                        return error.responseJSON.Message || error.responseJSON.message || fallback;
                    }

                    if (error && error.responseText) {
                        try {
                            var parsed = JSON.parse(error.responseText);
                            return parsed.Message || parsed.message || fallback;
                        } catch (_) {
                            return error.responseText || fallback;
                        }
                    }

                    return fallback;
                }

                function hasConnectionDetails() {
                    return value('#ServerUrl').trim() && value('#Username').trim() && value('#Password').trim();
                }

                function updateConnectionButtons() {
                    var disabled = !hasConnectionDetails();
                    page().querySelector('#TestConnectionButton').disabled = disabled;
                    page().querySelector('#RefreshCategoriesButton').disabled = disabled;
                }

                function selectedCategoryIds(containerId) {
                    return Array.prototype.slice.call(page().querySelectorAll('#' + containerId + ' input[type="checkbox"]:checked'))
                        .map(function (input) {
                            return input.value;
                        });
                }

                function updateSelectedCounts() {
                    page().querySelector('#LiveCategoryCount').textContent = selectedCategoryIds('LiveCategories').length + ' selected';
                    page().querySelector('#VodCategoryCount').textContent = selectedCategoryIds('VodCategories').length + ' selected';
                    page().querySelector('#SeriesCategoryCount').textContent = selectedCategoryIds('SeriesCategories').length + ' selected';
                }

                function formatDuration(milliseconds) {
                    if (milliseconds === null || milliseconds === undefined || milliseconds === '') {
                        return 'none';
                    }

                    var duration = Number(milliseconds);
                    if (!isFinite(duration)) {
                        return 'none';
                    }

                    if (duration < 1000) {
                        return Math.max(0, Math.round(duration)) + ' ms';
                    }

                    return (duration / 1000).toFixed(1) + ' seconds';
                }

                function field(object, pascalName, camelName) {
                    if (object[pascalName] !== undefined && object[pascalName] !== null) {
                        return object[pascalName];
                    }

                    return object[camelName];
                }

                function loadCacheSummary() {
                    return getJson('Jellyxtreme/CacheSummary').then(function (summary) {
                        var live = field(summary, 'LiveChannelCount', 'liveChannelCount') || 0;
                        var vod = field(summary, 'VodItemCount', 'vodItemCount') || 0;
                        var series = field(summary, 'SeriesItemCount', 'seriesItemCount') || 0;
                        var episodes = field(summary, 'EpisodeItemCount', 'episodeItemCount') || 0;
                        var cacheVersion = field(summary, 'CacheVersion', 'cacheVersion') || 'unknown';
                        var sync = field(summary, 'LastSuccessfulSyncUtc', 'lastSuccessfulSyncUtc') || field(summary, 'RefreshedAt', 'refreshedAt');
                        page().querySelector('#LastSyncStatus').textContent = sync ? 'Last sync: ' + new Date(sync).toLocaleString() : 'Last sync: never';
                        page().querySelector('#LiveChannelsCached').textContent = 'Live channels cached: ' + live;
                        page().querySelector('#VodItemsCached').textContent = 'VOD items cached: ' + vod;
                        page().querySelector('#SeriesCached').textContent = 'Series cached: ' + series;
                        page().querySelector('#EpisodesCached').textContent = 'Episodes cached: ' + episodes;
                        page().querySelector('#CacheVersion').textContent = 'Cache version: ' + cacheVersion;
                        page().querySelector('#SyncDuration').textContent = 'Sync duration: ' + formatDuration(field(summary, 'LastSyncDurationMs', 'lastSyncDurationMs'));

                        var lastError = field(summary, 'LastSyncError', 'lastSyncError') || '';
                        page().querySelector('#LastSyncError').textContent = 'Last error: ' + (lastError ? lastError : 'none');
                    }).catch(function () {
                        page().querySelector('#LastSyncStatus').textContent = 'Last sync: unavailable';
                        page().querySelector('#LiveChannelsCached').textContent = 'Live channels cached: unavailable';
                        page().querySelector('#VodItemsCached').textContent = 'VOD items cached: unavailable';
                        page().querySelector('#SeriesCached').textContent = 'Series cached: unavailable';
                        page().querySelector('#EpisodesCached').textContent = 'Episodes cached: unavailable';
                        page().querySelector('#CacheVersion').textContent = 'Cache version: unavailable';
                        page().querySelector('#SyncDuration').textContent = 'Sync duration: unavailable';
                        page().querySelector('#LastSyncError').textContent = 'Last error: unavailable';
                    });
                }

                function loadCachedCategories() {
                    return getJson('Jellyxtreme/Categories').then(function (snapshot) {
                        renderCategoryList('LiveCategories', snapshot.Live || snapshot.live, currentConfig.SelectedLiveCategoryIds);
                        renderCategoryList('VodCategories', snapshot.Vod || snapshot.vod, currentConfig.SelectedVodCategoryIds);
                        renderCategoryList('SeriesCategories', snapshot.Series || snapshot.series, currentConfig.SelectedSeriesCategoryIds);
                    }).catch(function () {
                        updateSelectedCounts();
                    });
                }

                function renderCategoryList(containerId, categories, selectedIds) {
                    var container = page().querySelector('#' + containerId);
                    var selected = new Set(selectedIds || []);
                    container.innerHTML = '';

                    (categories || []).forEach(function (category) {
                        var id = category.CategoryId || category.categoryId || category.category_id || '';
                        var name = category.CategoryName || category.categoryName || category.category_name || category.Name || category.name || id;
                        if (!id) {
                            return;
                        }

                        var label = document.createElement('label');
                        label.className = 'checkboxContainer';

                        var input = document.createElement('input');
                        input.type = 'checkbox';
                        input.setAttribute('is', 'emby-checkbox');
                        input.value = id;
                        input.checked = selected.has(id);
                        input.addEventListener('change', updateSelectedCounts);

                        var span = document.createElement('span');
                        span.textContent = name;

                        label.appendChild(input);
                        label.appendChild(span);
                        container.appendChild(label);
                    });
                    updateSelectedCounts();
                }

                function loadConfig() {
                    Dashboard.showLoadingMsg();

                    return ApiClient.getPluginConfiguration(pluginId).then(function (config) {
                        currentConfig = config || {};
                        page().querySelector('#ServerUrl').value = currentConfig.ServerUrl || '';
                        page().querySelector('#Username').value = currentConfig.Username || '';
                        page().querySelector('#Password').value = currentConfig.Password || '';
                        page().querySelector('#EnableLiveTv').checked = currentConfig.EnableLiveTv || false;
                        page().querySelector('#EnableVod').checked = currentConfig.EnableVod || false;
                        page().querySelector('#EnableSeries').checked = currentConfig.EnableSeries || false;
                        page().querySelector('#SyncIntervalHours').value = currentConfig.SyncIntervalHours || 12;
                        page().querySelector('#CacheMinutes').value = currentConfig.CacheMinutes || 60;
                        Dashboard.hideLoadingMsg();
                        updateConnectionButtons();
                        updateSelectedCounts();
                        loadCachedCategories();
                        loadCacheSummary();
                    });
                }

                function refreshCategories() {
                    var validationMessage = validateConnectionPayload(connectionPayload());
                    if (validationMessage) {
                        page().querySelector('#ConnectionStatus').textContent = validationMessage;
                        return Promise.resolve();
                    }

                    Dashboard.showLoadingMsg();
                    return postJson('Jellyxtreme/Categories', connectionPayload()).then(function (snapshot) {
                        renderCategoryList('LiveCategories', snapshot.Live || snapshot.live, currentConfig.SelectedLiveCategoryIds);
                        renderCategoryList('VodCategories', snapshot.Vod || snapshot.vod, currentConfig.SelectedVodCategoryIds);
                        renderCategoryList('SeriesCategories', snapshot.Series || snapshot.series, currentConfig.SelectedSeriesCategoryIds);
                        page().querySelector('#ConnectionStatus').textContent = 'Categories loaded.';
                        Dashboard.hideLoadingMsg();
                    }).catch(function (error) {
                        Dashboard.hideLoadingMsg();
                        page().querySelector('#ConnectionStatus').textContent = ajaxErrorMessage(error, 'Unable to refresh categories.');
                    });
                }

                document.getElementById('JellyxtremeConfigPage').addEventListener('pageshow', function () {
                    loadConfig();
                });

                ['#ServerUrl', '#Username', '#Password'].forEach(function (selector) {
                    document.getElementById('JellyxtremeConfigPage').querySelector(selector).addEventListener('input', updateConnectionButtons);
                });

                Array.prototype.slice.call(document.getElementById('JellyxtremeConfigPage').querySelectorAll('.sectionSelectAll')).forEach(function (button) {
                    button.addEventListener('click', function () {
                        Array.prototype.slice.call(page().querySelectorAll('#' + button.getAttribute('data-target') + ' input[type="checkbox"]')).forEach(function (input) {
                            input.checked = true;
                        });
                        updateSelectedCounts();
                    });
                });

                Array.prototype.slice.call(document.getElementById('JellyxtremeConfigPage').querySelectorAll('.sectionClearAll')).forEach(function (button) {
                    button.addEventListener('click', function () {
                        Array.prototype.slice.call(page().querySelectorAll('#' + button.getAttribute('data-target') + ' input[type="checkbox"]')).forEach(function (input) {
                            input.checked = false;
                        });
                        updateSelectedCounts();
                    });
                });

                document.getElementById('TestConnectionButton').addEventListener('click', function () {
                    var payload = connectionPayload();
                    var validationMessage = validateConnectionPayload(payload);
                    if (validationMessage) {
                        page().querySelector('#ConnectionStatus').textContent = validationMessage;
                        return;
                    }

                    Dashboard.showLoadingMsg();
                    postJson('Jellyxtreme/TestConnection', payload).then(function (result) {
                        var isSuccess = field(result || {}, 'IsSuccess', 'isSuccess') === true;
                        var message = field(result || {}, 'Message', 'message') || (isSuccess ? 'Connection successful.' : 'Connection failed.');
                        page().querySelector('#ConnectionStatus').textContent = isSuccess ? 'Connection successful.' : message;
                        Dashboard.hideLoadingMsg();
                    }).catch(function (error) {
                        page().querySelector('#ConnectionStatus').textContent = ajaxErrorMessage(error, 'Connection failed.');
                        Dashboard.hideLoadingMsg();
                    });
                });

                document.getElementById('RefreshCategoriesButton').addEventListener('click', function () {
                    refreshCategories();
                });

                document.getElementById('JellyxtremeConfigForm').addEventListener('submit', function (e) {
                    e.preventDefault();
                    Dashboard.showLoadingMsg();

                    ApiClient.getPluginConfiguration(pluginId).then(function (config) {
                        config.ServerUrl = value('#ServerUrl');
                        config.Username = value('#Username');
                        config.Password = value('#Password');
                        config.EnableLiveTv = checked('#EnableLiveTv');
                        config.EnableVod = checked('#EnableVod');
                        config.EnableSeries = checked('#EnableSeries');
                        config.SelectedLiveCategoryIds = selectedCategoryIds('LiveCategories');
                        config.SelectedVodCategoryIds = selectedCategoryIds('VodCategories');
                        config.SelectedSeriesCategoryIds = selectedCategoryIds('SeriesCategories');
                        config.SyncIntervalHours = parseInt(value('#SyncIntervalHours'), 10) || 12;
                        config.CacheMinutes = parseInt(value('#CacheMinutes'), 10) || 60;

                        ApiClient.updatePluginConfiguration(pluginId, config).then(Dashboard.processPluginConfigurationUpdateResult);
                    });

                    return false;
                });
            })();
        </script>
    </div>
</body>
</html>
