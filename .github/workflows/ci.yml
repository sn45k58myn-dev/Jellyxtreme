name: JellyXtreme CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Jellyxtreme.sln

      - name: Build
        run: dotnet build Jellyxtreme.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Jellyxtreme.sln --configuration Release --no-build

      - name: Package
        shell: pwsh
        run: ./scripts/package.ps1 -Configuration Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jellyxtreme-release
          path: artifacts/Jellyxtreme-v*.zip
          if-no-files-found: error
